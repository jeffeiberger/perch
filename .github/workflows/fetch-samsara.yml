name: Fetch Samsara Data

on:
  schedule:
    # GitHub's minimum cron interval is 1 minute.
    # We run the job, sleep 30s, then fetch again — giving ~30s resolution.
    - cron: '* * * * *'
  workflow_dispatch:   # allow manual trigger from the Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── FETCH #1 ────────────────────────────────────────────────────────
      - name: Fetch Samsara data (pass 1)
        env:
          SAMSARA_TOKEN: ${{ secrets.SAMSARA_API_TOKEN }}
          VEHICLE_ID:    ${{ secrets.SAMSARA_VEHICLE_ID }}
        run: |
          python3 scripts/fetch_samsara.py

      # ── WAIT 30s ─────────────────────────────────────────────────────────
      - name: Wait 30 seconds
        run: sleep 30

      # ── FETCH #2 ────────────────────────────────────────────────────────
      - name: Fetch Samsara data (pass 2)
        env:
          SAMSARA_TOKEN: ${{ secrets.SAMSARA_API_TOKEN }}
          VEHICLE_ID:    ${{ secrets.SAMSARA_VEHICLE_ID }}
        run: |
          python3 scripts/fetch_samsara.py

      # ── COMMIT ───────────────────────────────────────────────────────────
      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update telemetry data [skip ci]"
          git push
