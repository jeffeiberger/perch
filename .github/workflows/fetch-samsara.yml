name: Fetch Samsara Data

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Fetch Samsara data (pass 1)
        env:
          SAMSARA_TOKEN:      ${{ secrets.SAMSARA_API_TOKEN }}
          SAMSARA_VEHICLE_ID: ${{ secrets.SAMSARA_VEHICLE_ID }}
          SAMSARA_DOOR_ID:    ${{ secrets.SAMSARA_DOOR_ID }}
          SAMSARA_TEMP_ID:    ${{ secrets.SAMSARA_TEMP_ID }}
        run: python3 scripts/fetch_samsara.py

      - name: Wait 30 seconds
        run: sleep 30

      - name: Fetch Samsara data (pass 2)
        env:
          SAMSARA_TOKEN:      ${{ secrets.SAMSARA_API_TOKEN }}
          SAMSARA_VEHICLE_ID: ${{ secrets.SAMSARA_VEHICLE_ID }}
          SAMSARA_DOOR_ID:    ${{ secrets.SAMSARA_DOOR_ID }}
          SAMSARA_TEMP_ID:    ${{ secrets.SAMSARA_TEMP_ID }}
        run: python3 scripts/fetch_samsara.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update telemetry data [skip ci]"
          git push
